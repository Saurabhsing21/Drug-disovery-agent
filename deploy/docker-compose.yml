services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      A4T_ARTIFACT_DIR: /data/artifacts
      A4T_SYSTEM_LLM_PROVIDER: ${A4T_SYSTEM_LLM_PROVIDER:-auto}
      A4T_SOURCE_DISPATCH_MODE: ${A4T_SOURCE_DISPATCH_MODE:-sequential}
    volumes:
      - artifacts-data:/data/artifacts
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:8000/api
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      # Default: serve on port 80. For local dev where 80 is taken, run:
      #   A4T_HTTP_PORT=8080 docker compose up -d
      - "${A4T_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  artifacts-data:
