services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      A4T_ARTIFACT_DIR: /data/artifacts
      A4T_SYSTEM_LLM_PROVIDER: ${A4T_SYSTEM_LLM_PROVIDER:-auto}
      A4T_SOURCE_DISPATCH_MODE: ${A4T_SOURCE_DISPATCH_MODE:-sequential}
      A4T_MCP_PYTHON_BIN: python3
    volumes:
      - artifacts-data:/data/artifacts
      - ./saved_runs.db:/app/saved_runs.db
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:8000/api
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  artifacts-data:
