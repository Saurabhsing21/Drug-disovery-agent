services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drugagent
      POSTGRES_PASSWORD: password
      POSTGRES_DB: drugagent
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://drugagent:password@db:5432/drugagent
      A4T_ARTIFACT_DIR: /data/artifacts
      A4T_SYSTEM_LLM_PROVIDER: ${A4T_SYSTEM_LLM_PROVIDER:-auto}
      A4T_SOURCE_DISPATCH_MODE: ${A4T_SOURCE_DISPATCH_MODE:-sequential}
      A4T_MCP_PYTHON_BIN: python3
    volumes:
      - ./agents:/app/agents
      - ./ui_api:/app/ui_api
      - artifacts-data:/data/artifacts
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:8000/api
    depends_on:
      - api
    restart: unless-stopped

  viewer:
    build:
      context: ./viewer-app
    command: npm start -- -p 3001 -H 0.0.0.0
    ports:
      - "3001:3001"
    volumes:
      - ./viewer-app/src:/app/src
      - ./viewer-app/.next:/app/.next
      - ./viewer-app/public:/app/public
      - artifacts-data:/data/artifacts
    environment:
      - DATABASE_URL=postgresql://drugagent:password@db:5432/drugagent
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      - db
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  artifacts-data:
  postgres-data:
