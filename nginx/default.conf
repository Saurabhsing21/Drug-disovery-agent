server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  # Docker DNS resolver. Needed so nginx re-resolves service names if containers restart
  # (otherwise nginx can keep a stale IP and return 502).
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $web_upstream http://web:3000;
  set $api_upstream http://api:8000;

  # Next.js
  location / {
    proxy_pass $web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SSE endpoint: keep connection open, disable buffering.
  location ~* ^/api/runs/.*/events$ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600;
  }

  # FastAPI
  location /api/ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }
}
